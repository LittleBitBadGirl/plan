<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Task Planner</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: {
                            900: '#0d0d0f',
                            800: '#1a1a2e',
                            700: '#252540',
                            600: '#2f2f4f',
                        },
                        accent: '#3b82f6',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-dark-900 text-gray-200 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md p-8">
        <div class="bg-dark-800 rounded-xl border border-dark-600 p-8 shadow-xl">
            <!-- Logo -->
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-white mb-2">📋 Task Planner</h1>
                <p class="text-gray-400">Введите API-токен для входа</p>
            </div>

            <!-- Error message -->
            {% if error %}
            <div class="mb-6 p-4 bg-red-900/30 border border-red-500/30 rounded-lg text-red-400">
                {{ error }}
            </div>
            {% endif %}

            <!-- Login form -->
            <form method="post" action="/login" class="space-y-6">
                <div>
                    <label for="token" class="block text-sm font-medium text-gray-300 mb-2">
                        API Токен
                    </label>
                    <input
                        type="password"
                        id="token"
                        name="token"
                        required
                        autofocus
                        class="w-full px-4 py-3 bg-dark-700 border border-dark-500 rounded-lg text-white
                               placeholder-gray-500 focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent"
                        placeholder="Введите ваш API-токен"
                    >
                </div>

                <button
                    type="submit"
                    class="w-full px-6 py-3 bg-accent hover:bg-blue-600 text-white font-medium rounded-lg
                           transition-colors focus:outline-none focus:ring-2 focus:ring-accent focus:ring-offset-2 focus:ring-offset-dark-800"
                >
                    Войти
                </button>
            </form>

            <p class="mt-6 text-center text-sm text-gray-500">
                Токен указан в файле .env (API_TOKEN)
            </p>
        </div>
    </div>
</body>
</html>
