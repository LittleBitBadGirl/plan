<!-- Этот фрагмент заменяет содержимое контейнера подзадач -->

<!-- Список существующих подзадач -->
{% if subtasks and subtasks|length > 0 %}
    <div class="space-y-1 mb-2">
        {% for sub in subtasks %}
        <div class="flex items-center gap-2 text-sm {{ 'opacity-50 line-through text-gray-600' if sub.status == 'выполнена' else '' }}">
            <form hx-post="/tasks/{{ sub.id }}/complete"
                  hx-target="#subtask-{{ sub.id }}"
                  hx-swap="outerHTML"
                  class="inline">
                <button type="submit" class="text-xs text-green-500 hover:text-green-400">✅</button>
            </form>
            <span id="subtask-{{ sub.id }}" class="flex-1 truncate text-gray-300">{{ sub.title }}</span>
            <button hx-delete="/tasks/{{ sub.id }}/subtask"
                    hx-target="#subtasks-{{ parent_id }}"
                    hx-swap="innerHTML"
                    class="text-xs text-red-400 hover:text-red-300">🗑</button>
        </div>
        {% endfor %}
    </div>
{% else %}
    <p class="text-xs text-gray-500 italic mb-2">Нет подзадач</p>
{% endif %}

<!-- Форма добавления новой подзадачи (всегда внизу) -->
<form hx-post="/tasks/{{ parent_id }}/subtasks"
      hx-target="#subtasks-{{ parent_id }}"
      hx-swap="innerHTML"
      class="mt-1">
    <input type="text" name="title" placeholder="+ Добавить подзадачу..." required
           class="w-full bg-dark-900 border border-dark-700 rounded px-2 py-1 text-xs text-white placeholder-gray-600 focus:outline-none focus:border-purple-500/50">
</form>
