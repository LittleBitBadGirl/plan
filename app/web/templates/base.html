<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Task Planner{% endblock %}</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: {
                            900: '#0d0d0f',
                            800: '#1a1a2e',
                            700: '#252540',
                            600: '#2f2f4f',
                            500: '#3a3a5c',
                        },
                        accent: {
                            DEFAULT: '#3b82f6',
                            hover: '#2563eb',
                        },
                        success: '#22c55e',
                        warning: '#f59e0b',
                        danger: '#ef4444',
                    }
                }
            }
        }
    </script>

    <!-- HTMX CDN -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <!-- Custom styles -->
    <link rel="stylesheet" href="/web/static/css/style.css">

    {% block extra_head %}{% endblock %}
</head>
<body class="bg-dark-900 text-gray-200 min-h-screen">
    <div class="flex min-h-screen">
        <!-- Sidebar Navigation -->
        <aside class="w-64 bg-dark-800 border-r border-dark-600 flex flex-col">
            <!-- Logo -->
            <div class="p-6 border-b border-dark-600">
                <h1 class="text-xl font-bold text-white">📋 Task Planner</h1>
            </div>

            <!-- Nav Links -->
            <nav class="flex-1 p-4 space-y-1">
                <a href="/"
                   class="flex items-center px-4 py-3 rounded-lg transition-colors
                          {% if request.url.path == '/' %}bg-accent text-white{% else %}text-gray-400 hover:bg-dark-700 hover:text-white{% endif %}">
                    <span class="mr-3">📊</span>
                    <span>Дашборд</span>
                </a>

                <a href="/tasks"
                   class="flex items-center px-4 py-3 rounded-lg transition-colors
                          {% if request.url.path.startswith('/tasks') %}bg-accent text-white{% else %}text-gray-400 hover:bg-dark-700 hover:text-white{% endif %}">
                    <span class="mr-3">📝</span>
                    <span>Задачи</span>
                </a>

                <a href="/calendar"
                   class="flex items-center px-4 py-3 rounded-lg transition-colors
                          {% if request.url.path == '/calendar' %}bg-accent text-white{% else %}text-gray-400 hover:bg-dark-700 hover:text-white{% endif %}">
                    <span class="mr-3">📅</span>
                    <span>Календарь</span>
                </a>

                <a href="/categories"
                   class="flex items-center px-4 py-3 rounded-lg transition-colors
                          {% if request.url.path == '/categories' %}bg-accent text-white{% else %}text-gray-400 hover:bg-dark-700 hover:text-white{% endif %}">
                    <span class="mr-3">📂</span>
                    <span>Категории</span>
                </a>

                <a href="/recurring"
                   class="flex items-center px-4 py-3 rounded-lg transition-colors
                          {% if request.url.path == '/recurring' %}bg-accent text-white{% else %}text-gray-400 hover:bg-dark-700 hover:text-white{% endif %}">
                    <span class="mr-3">🔄</span>
                    <span>Периодические</span>
                </a>

                <a href="/stats"
                   class="flex items-center px-4 py-3 rounded-lg transition-colors
                          {% if request.url.path == '/stats' %}bg-accent text-white{% else %}text-gray-400 hover:bg-dark-700 hover:text-white{% endif %}">
                    <span class="mr-3">📈</span>
                    <span>Статистика</span>
                </a>

                <a href="/backlog"
                   class="flex items-center px-4 py-3 rounded-lg transition-colors
                          {% if request.url.path == '/backlog' %}bg-accent text-white{% else %}text-gray-400 hover:bg-dark-700 hover:text-white{% endif %}">
                    <span class="mr-3">📥</span>
                    <span>Бэклог</span>
                </a>

                <a href="/archive"
                   class="flex items-center px-4 py-3 rounded-lg transition-colors
                          {% if request.url.path == '/archive' %}bg-accent text-white{% else %}text-gray-400 hover:bg-dark-700 hover:text-white{% endif %}">
                    <span class="mr-3">🗄️</span>
                    <span>Архив</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-8 overflow-y-auto">
            {% block content %}{% endblock %}
        </main>
    </div>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
